dapps:
  up:
    description: Universal Profile Operations (LSP Standard)
    commands:
      # ⚠️ Requires --yes flag (confirmation mode by default)
      follow:
        description: "Follow (LSP26)"
        file: "./dapps/up/follow.js"
        args: [target, yes, direct, network]
        credentials: true
      # ⚠️ Requires --yes flag (confirmation mode by default)
      unfollow:
        description: "Unfollow"
        file: "./dapps/up/unfollow.js"
        args: [target, yes, direct, network]
        credentials: true
      # ⚠️ Requires --yes flag (confirmation mode by default)
      follow-batch:
        description: "Batch Follow"
        file: "./dapps/up/follow-batch.js"
        args: [targets, yes, direct, network]
        credentials: true
      # ⚠️ Requires --yes flag (confirmation mode by default)
      unfollow-batch:
        description: "Batch Unfollow"
        file: "./dapps/up/unfollow-batch.js"
        args: [targets, yes, direct, network]
        credentials: true
      get-follows:
        description: "Get following list (LSP26)"
        file: "./dapps/up/get-follows.js"
        args: [address, network, limit, json]
        credentials: false
      get-followers:
        description: "Get followers list (LSP26)"
        file: "./dapps/up/get-followers.js"
        args: [address, network, limit, json]
        credentials: false
      info:
        description: "UP Info"
        file: "./dapps/up/info.js"
        args: [address, network]
        credentials: false
      get-profile:
        description: "Get Profile (omit --address to use own UP)"
        file: "./dapps/up/get-profile.js"
        args: [address, network]
        credentials: true
      # ⚠️ Requires --yes flag (confirmation mode by default)
      update-profile:
        description: "Update Profile (merge by default, use --replace for full replacement)"
        file: "./dapps/up/update-profile.js"
        args: [key, json, name, description, tags, image, imageWidth, imageHeight, background, bgWidth, bgHeight, avatar, links, replace, yes, direct, network]
        credentials: true
      # ⚠️ Requires --yes flag (confirmation mode by default)
      update-grid:
        description: "Update TheGrid Metadata"
        file: "./dapps/up/update-grid.js"
        args: [json, yes, network]
        credentials: true
      get-grid:
        description: "Get TheGrid Metadata (omit --address to use own UP)"
        file: "./dapps/up/get-grid.js"
        args: [address, network]
        credentials: true
      # ⚠️ transfer requires --yes flag (confirmation mode by default)
      tokens:
        description: "Token Operations"
        file: "./dapps/up/tokens.js"
        args: [subcommand, token, to, amount, yes, direct, network]
        credentials: true
      # ⚠️ Requires --yes flag (confirmation mode by default)
      send-lyx:
        description: "Send LYX to another address"
        file: "./dapps/up/send-lyx.js"
        args: [to, amount, yes, direct, network]
        credentials: true

  forever-moments:
    description: Forever Moments (NFT Mint / Collection)
    commands:
      mint:
        description: "Mint a Moment (NFT) - supports images, videos, and audio. Collection defaults to your UP address."
        file: "./dapps/forever-moments/moment-mint.js"
        args: [image, video, audio, title, description, collection, tags, yes, direct, network]
        credentials: true
      create-collection:
        description: "Create a new Collection (2-step: deploy + register)"
        file: "./dapps/forever-moments/collection-create.js"
        args: [name, image, category, description, yes, direct, network]
        credentials: true
      register-up:
        description: "Register your UP address as a Collection (no deployment needed)"
        file: "./dapps/forever-moments/collection-register-up.js"
        args: [type, fee, gating, yes, direct, network]
        credentials: true
      charge:
        description: "Charge LIKES (LYX→LIKES)"
        file: "./dapps/forever-moments/likes-charge.js"
        args: [lyx, yes, direct, network]
        credentials: true

  universal-trust:
    description: Universal Trust (Agent Registration / Endorsement)
    commands:
      # ⚠️ Requires --yes flag (confirmation mode by default)
      endorse:
        description: "Send Endorsement"
        file: "./dapps/universal-trust/endorse.js"
        args: [target, reason, yes, direct, network]
        credentials: true
      verify:
        description: "Verify Registration Status"
        file: "./dapps/universal-trust/verify.js"
        args: [address, detailed]
        credentials: false
      list-agents:
        description: "List all registered agents"
        file: "./dapps/universal-trust/list-agents.js"
        args: [network]
        credentials: false
      get-endorsements:
        description: "Get endorsements for an address"
        file: "./dapps/universal-trust/get-endorsements.js"
        args: [address, network]
        credentials: false
      # ⚠️ Requires --yes flag (confirmation mode by default)
      register:
        description: "Register New Agent"
        file: "./dapps/universal-trust/register.js"
        args: [name, description, metadata-uri, yes, direct, network]
        credentials: true
      # ⚠️ Requires --yes flag (confirmation mode by default)
      publish-skills:
        description: "Publish Skill"
        file: "./dapps/universal-trust/publish-skills.js"
        args: [name, content, yes, direct, network]
        credentials: true
      read-skills:
        description: "Read Skills"
        file: "./dapps/universal-trust/read-skills.js"
        args: [address, skill-key, network]
        credentials: false

  agent-token-claimer:
    description: Agent Token Claimer (LSP7/LSP8 Token Drops)
    commands:
      # Deployment
      deploy:
        description: "Deploy a new token drop (interactive by default)"
        file: "./dapps/agent-token-claimer/deploy.js"
        args: [type, name, symbol, amount, max, non-divisible, divisible, yes, network]
        credentials: true
      
      # Configuration
      # ⚠️ Requires --yes flag (confirmation mode by default)
      set-metadata:
        description: "Set LSP4 metadata (required for NFT drops, recommended for tokens)"
        file: "./dapps/agent-token-claimer/set-metadata.js"
        args: [token, image, description, yes, network]
        credentials: true
      set-claim-enabled:
        description: "Enable or disable claiming"
        file: "./dapps/agent-token-claimer/set-claim-enabled.js"
        args: [token, enabled, yes, network]
        credentials: true
      set-claim-window:
        description: "Set claim time window (start/end time)"
        file: "./dapps/agent-token-claimer/set-claim-window.js"
        args: [token, claim-start, claim-end, yes, network]
        credentials: true
      set-requirements:
        description: "Set token and follower requirements"
        file: "./dapps/agent-token-claimer/set-requirements.js"
        args: [token, require-token, followers, yes, network]
        credentials: true
      set-codeword:
        description: "Set or clear codeword"
        file: "./dapps/agent-token-claimer/set-codeword.js"
        args: [token, codeword, yes, network]
        credentials: true
      
      # Claiming
      check:
        description: "Check token drop eligibility and claim status"
        file: "./dapps/agent-token-claimer/check.js"
        args: [token, address, network]
        credentials: false
      # ⚠️ Requires --yes flag (confirmation mode by default)
      claim:
        description: "Claim tokens from a drop (requires eligibility)"
        file: "./dapps/agent-token-claimer/claim.js"
        args: [token, codeword, yes, network]
        credentials: true
      
      # Auto-claimer utilities
      decode-codeword:
        description: "Decode codeword from existing on-chain claims"
        file: "./dapps/agent-token-claimer/decode-codeword.js"
        args: [token, limit, network]
        credentials: false
      auto-check:
        description: "Scan all drops for eligibility (mode: check-only|claim-pending|auto-claim)"
        file: "./dapps/agent-token-claimer/auto-check.js"
        args: [mode, limit, network]
        credentials: true